# ═══════════════════════════════════════════════════════════════
# AX Coding Agent — 풀스택 Docker Compose
#
# 구성:
#   1. litellm-db   : PostgreSQL (LiteLLM 내부 DB)
#   2. litellm      : LLM Gateway (모델 라우팅 + Langfuse 트레이싱)
#   3. agent        : AI Coding Agent (대화형 CLI)
#
# 사용법:
#   # LLM Gateway 기동
#   docker compose up -d litellm
#
#   # 에이전트 실행 (풀스택)
#   docker compose run --rm agent
#
#   # 종료
#   docker compose down
# ═══════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL (LiteLLM 내부 DB) ──
  litellm-db:
    image: postgres:16-alpine
    container_name: ax-litellm-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=litellm
    volumes:
      - litellm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agent-net

  # ── LLM Gateway (LiteLLM Proxy + DB + Langfuse) ──
  litellm:
    image: ghcr.io/berriai/litellm-database:main-latest
    container_name: ax-litellm-proxy
    restart: unless-stopped
    ports:
      - "4001:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    env_file:
      - .env
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-harness-local-dev}
      - DATABASE_URL=postgresql://litellm:litellm@litellm-db:5432/litellm
      - LANGFUSE_HOST=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
    command: ["--config", "/app/config.yaml"]
    depends_on:
      litellm-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request as r; r.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - agent-net

  # ── AI Coding Agent ──
  # NOTE: 이 서비스는 `docker compose build`로 이미지를 만드는 용도입니다.
  # 실행은 `./ax-agent.sh`가 별도의 `docker run`으로 수행하므로, `make up`은
  # 이 서비스를 기동하지 않습니다. `docker compose run --rm agent`로 직접
  # 실행하고 싶다면 HOST_UID/HOST_GID를 먼저 export 하세요:
  #   export HOST_UID=$(id -u) HOST_GID=$(id -g)
  # 기본 WORKSPACE_DIR는 ./workspace 로 고정되어 있어 프로젝트 루트가
  # 실수로 바인드 마운트되는 것을 방지합니다.
  agent:
    build: .
    image: ax-coding-agent           # ax-agent.sh가 이 이름으로 docker run 직접 호출
    container_name: ax-coding-agent
    stdin_open: true
    tty: true
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
      - agent-memory:/app/memory_store
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - LLM_PROVIDER=litellm
      - LITELLM_PROXY_URL=http://litellm:4000/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-harness-local-dev}
      - MEMORY_DB_PATH=/app/memory_store/memory.db
      - MAX_ITERATIONS=${MAX_ITERATIONS:-50}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-120}
      # 모델 설정은 .env에서 주입
      - REASONING_MODEL=${REASONING_MODEL}
      - STRONG_MODEL=${STRONG_MODEL}
      - DEFAULT_MODEL=${DEFAULT_MODEL}
      - FAST_MODEL=${FAST_MODEL}
    depends_on:
      litellm:
        condition: service_healthy
    profiles:
      - manual                       # make up에서 자동 기동 방지
    networks:
      - agent-net

volumes:
  litellm_db_data:
    name: ax-litellm-db-data
  agent-memory:
    name: ax-agent-memory

networks:
  agent-net:
    name: ax-agent-network
