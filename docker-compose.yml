# ═══════════════════════════════════════════════════════════════
# AX Coding Agent — 풀스택 Docker Compose
#
# 구성:
#   1. ax-agent     : AI Coding Agent (대화형 CLI)
#   2. litellm      : LLM Gateway (모델 라우팅 + Langfuse 트레이싱)
#
# 사용법:
#   # 풀스택 기동 (에이전트 + LLM Gateway)
#   docker compose run --rm agent
#
#   # LLM Gateway만 기동 (로컬 에이전트에서 접속)
#   docker compose up -d litellm
#
#   # 특정 프로젝트 디렉토리에서 작업
#   docker compose run --rm -v /path/to/project:/workspace agent
#
#   # 종료
#   docker compose down
# ═══════════════════════════════════════════════════════════════

services:
  # ── AI Coding Agent ──
  agent:
    build: .
    container_name: ax-coding-agent
    stdin_open: true     # 대화형 CLI용
    tty: true
    volumes:
      # 작업 디렉토리 마운트 — 에이전트가 여기에 코드를 생성
      - ${WORKSPACE_DIR:-.}:/workspace
      # 메모리 영속화 — 컨테이너 재시작해도 메모리 유지
      - agent-memory:/app/memory_store
    environment:
      - LLM_PROVIDER=litellm
      - LITELLM_PROXY_URL=http://litellm:4000/v1
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-harness-local-dev}
      - MEMORY_DB_PATH=/app/memory_store/memory.db
      - MAX_ITERATIONS=${MAX_ITERATIONS:-50}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-60}
    depends_on:
      litellm:
        condition: service_healthy
    networks:
      - agent-net

  # ── LLM Gateway (LiteLLM Proxy) ──
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ax-litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      # LiteLLM
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-harness-local-dev}

      # 프로바이더 API 키
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

      # Langfuse 관측성 (자동 트레이싱)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      - LITELLM_CALLBACKS=langfuse
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agent-net

volumes:
  agent-memory:
    name: ax-agent-memory

networks:
  agent-net:
    name: ax-agent-network
